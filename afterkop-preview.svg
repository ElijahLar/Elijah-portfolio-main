    <stop offset="0" stop-color="#0d1830"/>
    <stop offset="0.55" stop-color="#152544"/>
    <stop offset="1" stop-color="#d8e9fb"/>
  </linearGradient>
  <linearGradient id="lime" x1="0" x2="1">
    <stop offset="0" stop-color="#d9ff7c"/>
