<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
<title id="title">AfterKop product cover</title>
<desc id="desc">A clean branded cover visual for the AfterKop case study.</desc>
<defs>
