</defs>

<rect width="1200" height="720" fill="url(#bg)"/>
<rect x="36" y="30" width="1128" height="54" rx="14" fill="none" stroke="#314767"/>
<text x="62" y="64" fill="#ffffff" font-family="Outfit, sans-serif" font-size="30" font-weight="700">AfterK&#246;p</text>
<rect x="972" y="40" width="154" height="34" rx="17" fill="url(#lime)"/>
<text x="1008" y="62" fill="#111111" font-family="Figtree, sans-serif" font-size="17" font-weight="700">Book a demo</text>

<text x="60" y="210" fill="#d8e6fb" font-family="Outfit, sans-serif" font-size="18" letter-spacing="4">SWEDISH SHOPIFY SUPPORT SAAS</text>
<text x="60" y="302" fill="#ffffff" font-family="Outfit, sans-serif" font-size="92" font-weight="700">AfterK&#246;p</text>
<text x="60" y="370" fill="#e7eefc" font-family="Figtree, sans-serif" font-size="31">Returns, refunds, support cases, and AI-assisted replies</text>
<text x="60" y="412" fill="#e7eefc" font-family="Figtree, sans-serif" font-size="31">for Swedish Shopify stores in one calmer workflow.</text>

<rect x="60" y="484" width="236" height="64" rx="22" fill="#ffffff"/>
